<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Cantinho</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            /* Centralizando verticalmente */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            /* Animação suave */
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { color: #d63031; }
        input[type="password"], input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff7675;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #d63031; }
        .hidden { display: none; }
        .message-box {
            background-color: #fab1a0;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 18px;
            font-style: italic;
        }
        .logout {
            background-color: #b2bec3;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1>❤️ Nosso Cantinho ❤️</h1>
        <p>Digite sua senha para entrar:</p>
        <input type="password" id="password" placeholder="Sua senha secreta">
        <br>
        <button onclick="fazerLogin()">Entrar</button>
        <p id="erro-login" style="color: red; display: none;">Senha incorreta!</p>
    </div>

    <div id="boyfriend-screen" class="hidden">
        <h1>Painel do Namorado 👑</h1>
        <p>Adicione uma nova mensagem romântica para ela:</p>
        <input type="text" id="nova-mensagem" placeholder="Ex: Amo o seu sorriso...">
        <br>
        <button onclick="adicionarMensagem()">Salvar Mensagem</button>
        <p id="sucesso-msg" style="color: green; display: none;">Mensagem salva no Firebase!</p>
        <br>
        <button class="logout" onclick="sair()">Sair</button>
    </div>

    <div id="girlfriend-screen" class="hidden">
        <h1>Para a mulher da minha vida 🌹</h1>
        <p>Clique no botão para receber um carinho:</p>
        <button onclick="mostrarMensagemAleatoria()">Ver Mensagem</button>
        
        <div id="display-mensagem" class="message-box hidden"></div>
        <br>
        <button class="logout" onclick="sair()">Sair</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // Configurações do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBD3vyhAkFrtkvlHUGhGde5s2goX6NLTNE",
        authDomain: "gabriel-fabiola.firebaseapp.com",
        projectId: "gabriel-fabiola",
        storageBucket: "gabriel-fabiola.firebasestorage.app",
        messagingSenderId: "808043910878",
        appId: "1:808043910878:web:d4e978449c6d9fc36f144f",
        measurementId: "G-KJPJDYBSH7"
    };

    // Inicializando o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Senhas de acesso
    const senhaNamorado = "ele123";
    const senhaNamorada = "ela123";

    let mensagens = [];

    // ================= EVENTOS DE TECLADO (Melhoria) =================
    // Limpa o erro e permite usar a tecla "Enter" no login
    document.getElementById("password").addEventListener("keypress", function(event) {
        document.getElementById("erro-login").style.display = "none";
        if (event.key === "Enter") {
            fazerLogin();
        }
    });

    // Permite usar a tecla "Enter" para salvar a mensagem
    document.getElementById("nova-mensagem").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            adicionarMensagem();
        }
    });
    // =================================================================

    // Busca as mensagens direto do banco de dados quando a página carrega
    function carregarMensagens() {
        db.collection("mensagens").onSnapshot((snapshot) => {
            mensagens = [];
            snapshot.forEach((doc) => {
                mensagens.push(doc.data().texto);
            });
        });
    }

    function fazerLogin() {
        const senha = document.getElementById("password").value;
        const erro = document.getElementById("erro-login");

        if (senha === senhaNamorado) {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("boyfriend-screen").classList.remove("hidden");
            erro.style.display = "none";
        } else if (senha === senhaNamorada) {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("girlfriend-screen").classList.remove("hidden");
            erro.style.display = "none";
        } else {
            erro.style.display = "block";
        }
    }

    function adicionarMensagem() {
        const inputMsg = document.getElementById("nova-mensagem");
        const msg = inputMsg.value.trim();

        if (msg !== "") {
            // Salva o documento no Cloud Firestore
            db.collection("mensagens").add({
                texto: msg,
                dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                inputMsg.value = "";
                const sucesso = document.getElementById("sucesso-msg");
                sucesso.style.display = "block";
                setTimeout(() => sucesso.style.display = "none", 3000);
            })
            .catch((error) => {
                console.error("Erro ao salvar: ", error);
                alert("Ops, algo deu errado ao salvar.");
            });
        }
    }

    function mostrarMensagemAleatoria() {
        const display = document.getElementById("display-mensagem");
        
        if (mensagens.length === 0) {
            display.innerText = "Nenhuma mensagem cadastrada ainda. Diga para ele escrever algo! ❤️";
            display.classList.remove("hidden");
            return;
        }
        
        const indiceAleatorio = Math.floor(Math.random() * mensagens.length);
        display.innerText = mensagens[indiceAleatorio];
        display.classList.remove("hidden");
    }

    function sair() {
        document.getElementById("password").value = "";
        document.getElementById("display-mensagem").classList.add("hidden");
        document.getElementById("boyfriend-screen").classList.add("hidden");
        document.getElementById("girlfriend-screen").classList.add("hidden");
        document.getElementById("login-screen").classList.remove("hidden");
    }

    // Inicializa a escuta do banco de dados
    carregarMensagens();
</script>

</body>
</html>
